syntax = "proto3";

package opaque.gpu.v1;

option go_package = "github.com/Prasad-178/opaque/api/proto/gpuhe;gpuhe";

// GPUHEService offloads expensive HE operations to a GPU-accelerated server.
//
// Architecture:
//   Client (Go/Lattigo) handles: key generation, encryption, decryption
//   GPU Server handles: homomorphic multiply, rescale, Galois rotations, add
//
// The client sends evaluation keys once (RegisterEvalKeys), then sends
// encrypted queries for batch dot product computation. The server never
// has access to secret keys or decrypted data.
//
// Two modes:
//   - CPU stub: uses Lattigo-serialized bytes (bytes fields)
//   - GPU (HEonGPU): uses raw uint64 coefficients (RawPolynomial fields)
service GPUHEService {
  // InitContext creates an HEonGPU context with the given parameters and returns
  // the server's NTT primitive roots (ψ per prime). The client needs these roots
  // to convert evaluation key coefficients from Lattigo's NTT domain to HEonGPU's.
  // Must be called before RegisterEvalKeys.
  rpc InitContext(InitContextRequest) returns (InitContextResponse);

  // RegisterEvalKeys sends evaluation keys (converted to server's NTT domain).
  rpc RegisterEvalKeys(RegisterEvalKeysRequest) returns (RegisterEvalKeysResponse);

  // BatchDotProduct computes packed dot products via HE.
  rpc BatchDotProduct(BatchDotProductRequest) returns (BatchDotProductResponse);

  // HealthCheck reports server status and backend type.
  rpc HealthCheck(GPUHealthCheckRequest) returns (GPUHealthCheckResponse);
}

// RawPolynomial represents a single polynomial in RNS+NTT form.
// Layout: coefficients[level * ring_size + i] for level in [0, num_levels), i in [0, ring_size).
// This is the format used for cross-library coefficient transfer (Lattigo ↔ HEonGPU).
message RawPolynomial {
  // Flat array of uint64 coefficients: num_levels × ring_size values.
  // Ordered as: [level0_coeff0, level0_coeff1, ..., level0_coeffN-1, level1_coeff0, ...]
  repeated uint64 coefficients = 1 [packed = true];

  // Number of active modulus levels in this polynomial.
  int32 num_levels = 2;

  // Ring size (N = 2^LogN, e.g., 16384).
  int32 ring_size = 3;
}

// RawCiphertext represents a CKKS ciphertext as raw polynomial coefficients.
// A standard ciphertext has 2 polynomials (c0, c1).
message RawCiphertext {
  // Polynomials in the ciphertext (typically 2: c0 and c1).
  repeated RawPolynomial polynomials = 1;

  // CKKS scale factor (e.g., 2^45).
  double scale = 2;

  // Whether coefficients are in NTT domain (should always be true for CKKS).
  bool is_ntt = 3;

  // Depth (number of rescale operations performed).
  int32 depth = 4;
}

// RawPlaintext represents a CKKS plaintext as raw polynomial coefficients.
message RawPlaintext {
  RawPolynomial polynomial = 1;
  double scale = 2;
  bool is_ntt = 3;
}

// CKKSParams contains the CKKS parameter specification needed by the GPU server
// to create a matching HE context.
message CKKSParams {
  // Log2 of ring degree (e.g., 14 for N=16384).
  int32 log_n = 1;

  // Exact modulus primes for the ciphertext modulus chain Q.
  repeated uint64 q_moduli = 2 [packed = true];

  // Exact modulus primes for the key-switching auxiliary chain P.
  repeated uint64 p_moduli = 3 [packed = true];

  // Default scale (log2, e.g., 45 for scale=2^45).
  int32 log_default_scale = 4;
}

// InitContextRequest asks the GPU server to create an HEonGPU context
// with the given CKKS parameters and return its NTT roots.
message InitContextRequest {
  string session_id = 1;
  CKKSParams params = 2;
}

// InitContextResponse returns the server's NTT primitive roots (ψ per prime).
// The client uses these to convert evaluation key coefficients from Lattigo's
// NTT domain to HEonGPU's NTT domain before sending them.
message InitContextResponse {
  bool success = 1;
  string error = 2;

  // Primitive 2N-th root of unity (ψ) for each prime in Q∪P order.
  // These are the roots HEonGPU selected for its NTT — they may differ
  // from Lattigo's roots and are non-deterministic across server restarts.
  repeated uint64 ntt_roots = 3 [packed = true];
}

// RegisterEvalKeysRequest sends CKKS parameters and evaluation keys.
message RegisterEvalKeysRequest {
  // Session ID for this client.
  string session_id = 1;

  // CKKS parameters with exact modulus primes.
  CKKSParams params = 2;

  // Galois keys as raw polynomial data.
  // Each key corresponds to one galois_element.
  repeated bytes galois_keys_serialized = 3;
  repeated uint64 galois_elements = 4 [packed = true];

  // Relinearization key (serialized).
  bytes relin_key_serialized = 5;

  // Legacy: Lattigo-serialized params (for CPU stub compatibility).
  bytes ckks_params_binary = 6;

  // HEonGPU-format Galois keys (with NTT domain conversion applied).
  // This is a single binary blob that HEonGPU's Galoiskey::load() can read directly.
  bytes galois_keys_heongpu = 7;
}

message RegisterEvalKeysResponse {
  bool success = 1;
  string error = 2;
  uint64 gpu_memory_bytes = 3;
}

// BatchDotProductRequest sends encrypted query and plaintext centroids.
message BatchDotProductRequest {
  string session_id = 1;

  // Raw coefficient format (for HEonGPU GPU backend).
  RawCiphertext raw_query = 2;
  RawPlaintext raw_centroids = 3;

  // Legacy: Lattigo-serialized format (for CPU stub backend).
  bytes encrypted_query = 4;
  bytes packed_centroids = 5;

  // Computation parameters.
  int32 num_centroids = 6;
  int32 dimension = 7;

  // Raw float64 plaintext values — server encodes natively with HEonGPU encoder.
  // This avoids NTT domain conversion for the plaintext entirely.
  repeated double plaintext_values = 8 [packed = true];

  // Scale for encoding (e.g., 2^45). Required when plaintext_values is used.
  double plaintext_scale = 9;

  // If true, raw_query coefficients are in COEFFICIENT domain (not NTT).
  // The server will apply its own NTT before computing.
  // This avoids cross-library NTT conversion issues entirely.
  bool query_is_coeff_domain = 10;
}

message BatchDotProductResponse {
  // Raw coefficient result (for HEonGPU GPU backend).
  RawCiphertext raw_result = 1;

  // Legacy: Lattigo-serialized result (for CPU stub backend).
  bytes encrypted_result = 2;

  string error = 3;

  // Timing (microseconds).
  int64 compute_time_us = 4;
  int64 multiply_us = 5;
  int64 rescale_us = 6;
  int64 rotate_us = 7;
  int64 add_us = 8;
}

// GPUHealthCheckRequest is empty.
message GPUHealthCheckRequest {}

message GPUHealthCheckResponse {
  enum Status {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  Status status = 1;

  enum Backend {
    CPU_STUB = 0;
    CUDA = 1;
    METAL = 2;
  }
  Backend backend = 2;
  string device_name = 3;
  int32 active_sessions = 4;
}
