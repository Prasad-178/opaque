# staticcheck configuration — see https://staticcheck.dev/docs/configuration/
#
# We disable U1000 (unused) globally for now. The HEonGPU bridge
# (pkg/crypto/{ciphertext_convert,gpu_provider,heongpu_format,ntt_convert}.go)
# carries a body of NTT-domain conversion helpers that are exercised only when
# the GPU service is wired in — kept on `main` deliberately as scaffolding for
# the upcoming GPU integration. Several pkg/client and pkg/hierarchical
# helpers fall in the same bucket. Flagging them as dead code would force us
# to delete the scaffolding and re-introduce it later, which we don't want.
#
# Everything else (SA*, ST*, S1*) stays on. When the GPU integration lands
# and these helpers become reachable, remove the override and let staticcheck
# enforce U1000 across the tree again.
# Disabled checks:
#
# U1000: dead code. HEonGPU bridge scaffolding (see top comment) is kept on
# main as WIP — flagging it would force premature deletion.
#
# ST1000: package comment requirement. The generated proto files
# (api/proto/*.pb.go, api/proto/gpuhe/*.pb.go) can't carry one, and adding a
# floating .go file just to satisfy the linter buys nothing. Same for the
# small WIP files that already have rich per-symbol docs.
#
# ST1003: identifier underscore style. Two of the cmd/* dump utilities use
# names that mirror the HEonGPU C++ field names on purpose (Q_size,
# galoiskey_size_heongpu) — renaming to camelCase would make the line-by-line
# port harder to audit.
#
# ST1021: type-doc-comment leading-word style. Several existing types have
# comments that describe the role rather than restate the name; this is a
# stylistic preference, not a correctness signal.
checks = ["all", "-U1000", "-ST1000", "-ST1003", "-ST1021"]
